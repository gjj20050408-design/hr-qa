<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - HR制度智能问答系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            primary: { DEFAULT: '#0F172A', light: '#1E293B', hover: '#334155' },
            accent: { DEFAULT: '#0369A1', light: '#0284C7', hover: '#075985' },
            surface: { DEFAULT: '#F8FAFC', card: '#FFFFFF', muted: '#F1F5F9' },
            border: { DEFAULT: '#E2E8F0', light: '#F1F5F9' },
          }
        }
      }
    }
  </script>
  <style>
    body { background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%); min-height: 100vh; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <div class="w-full max-w-5xl flex rounded-2xl overflow-hidden shadow-2xl">
    <!-- 左侧品牌区 -->
    <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-primary to-primary-light p-12 flex-col justify-between relative overflow-hidden">
      <div class="absolute top-0 right-0 w-64 h-64 bg-accent/20 rounded-full -translate-y-1/2 translate-x-1/2"></div>
      <div class="absolute bottom-0 left-0 w-96 h-96 bg-accent/10 rounded-full translate-y-1/2 -translate-x-1/2"></div>
      <div class="relative z-10">
        <div class="w-12 h-12 bg-accent rounded-xl flex items-center justify-center mb-8">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </div>
        <h1 class="text-3xl font-bold text-white mb-3">HR制度智能问答系统</h1>
        <p class="text-blue-200 leading-relaxed">7×24小时自助HR制度查询与智能问答服务，秒级获取准确答案</p>
      </div>
      <div class="relative z-10 space-y-4">
        <div class="flex items-center gap-3 text-blue-200">
          <svg class="w-5 h-5 text-green-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          <span class="text-sm">基于AI的智能RAG问答引擎</span>
        </div>
        <div class="flex items-center gap-3 text-blue-200">
          <svg class="w-5 h-5 text-green-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          <span class="text-sm">全文搜索 + FAQ快速匹配</span>
        </div>
        <div class="flex items-center gap-3 text-blue-200">
          <svg class="w-5 h-5 text-green-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          <span class="text-sm">制度文档分类管理与权限控制</span>
        </div>
      </div>
    </div>

    <!-- 右侧登录表单 -->
    <div class="w-full lg:w-1/2 bg-white p-8 sm:p-12 flex flex-col justify-center">
      <div class="lg:hidden mb-8 text-center">
        <div class="w-10 h-10 bg-accent rounded-lg flex items-center justify-center mx-auto mb-3">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </div>
        <h1 class="text-xl font-bold text-primary">HR制度智能问答系统</h1>
      </div>

      <div class="mb-8">
        <h2 class="text-2xl font-bold text-primary">欢迎回来</h2>
        <p class="text-slate-500 mt-1">请登录您的账号</p>
      </div>

      <!-- Tab 切换 -->
      <div class="flex border-b border-border mb-6">
        <button class="pb-3 px-1 text-sm font-semibold text-accent border-b-2 border-accent -mb-px" id="loginTab">账号登录</button>
        <button class="pb-3 px-1 text-sm text-slate-400 hover:text-slate-600 ml-6" id="registerTab" onclick="switchTab('register')">员工注册</button>
      </div>

      <!-- 登录表单 -->
      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">账号</label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <input type="text" placeholder="工号 / 邮箱" value="admin001" class="w-full pl-10 pr-4 py-2.5 bg-surface-muted border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">密码</label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <input type="password" placeholder="输入密码" value="Admin@123" class="w-full pl-10 pr-12 py-2.5 bg-surface-muted border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all">
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
        </div>
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="w-4 h-4 rounded border-border text-accent focus:ring-accent">
            <span class="text-sm text-slate-600">记住我</span>
          </label>
          <a href="#" class="text-sm text-accent hover:text-accent-hover">忘记密码？</a>
        </div>
        <button type="submit" class="w-full py-2.5 bg-accent text-white font-semibold rounded-lg hover:bg-accent-hover transition-colors shadow-lg shadow-accent/25">
          登 录
        </button>
      </form>

      <!-- 注册表单 -->
      <form id="registerForm" class="space-y-4 hidden">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">工号 <span class="text-red-500">*</span></label>
            <input type="text" placeholder="字母数字4-20位" class="w-full px-3 py-2.5 bg-surface-muted border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">姓名 <span class="text-red-500">*</span></label>
            <input type="text" placeholder="真实姓名" class="w-full px-3 py-2.5 bg-surface-muted border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">部门 <span class="text-red-500">*</span></label>
          <select class="w-full px-3 py-2.5 bg-surface-muted border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all text-slate-600">
            <option value="">请选择部门</option>
            <option value="dept-002">技术部</option>
            <option value="dept-003">产品部</option>
            <option value="dept-004">人力资源部</option>
            <option value="dept-005">财务部</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">邮箱</label>
            <input type="email" placeholder="选填" class="w-full px-3 py-2.5 bg-surface-muted border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">手机号</label>
            <input type="tel" placeholder="选填" class="w-full px-3 py-2.5 bg-surface-muted border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">密码 <span class="text-red-500">*</span></label>
          <input type="password" placeholder="8位以上，含大小写字母+数字" class="w-full px-3 py-2.5 bg-surface-muted border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all">
        </div>
        <button type="submit" class="w-full py-2.5 bg-accent text-white font-semibold rounded-lg hover:bg-accent-hover transition-colors shadow-lg shadow-accent/25">
          注 册
        </button>
      </form>

      <p class="text-center text-xs text-slate-400 mt-8">预置管理员: admin001 / Admin@123</p>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
      document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
      document.getElementById('loginTab').classList.toggle('text-accent', tab === 'login');
      document.getElementById('loginTab').classList.toggle('border-accent', tab === 'login');
      document.getElementById('loginTab').classList.toggle('text-slate-400', tab !== 'login');
      document.getElementById('loginTab').classList.toggle('border-transparent', tab !== 'login');
      document.getElementById('registerTab').classList.toggle('text-accent', tab === 'register');
      document.getElementById('registerTab').classList.toggle('border-accent', tab === 'register');
      document.getElementById('registerTab').classList.toggle('text-slate-400', tab !== 'register');
      document.getElementById('registerTab').classList.toggle('border-transparent', tab !== 'register');
    }
  </script>
</body>
</html>
